<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Eyes313 Commander Suite</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
            padding: 0;
        }
        header { 
            background: #1e293b; 
            padding: 25px; 
            text-align: center; 
            border-bottom: 3px solid #3b82f6;
        }
        header h1 { margin: 0; font-size: 2.5rem; color: #3b82f6; }
        header p { margin: 5px 0 0 0; color: #94a3b8; }
        .container { 
            padding: 20px; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        .card { 
            background: #1e293b; 
            padding: 25px; 
            margin: 25px 0; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            border: 1px solid #334155;
        }
        h2 { margin-top: 0; color: #f1f5f9; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            margin-top: 12px; 
            border-radius: 8px; 
            border: 1px solid #475569; 
            background: #0f172a; 
            color: #f8fafc; 
            box-sizing: border-box; 
            font-size: 1rem;
        }
        textarea { height: 100px; resize: vertical; }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            background: #3b82f6; 
            color: white; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer; 
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { 
            background: #2563eb; 
        }
        button:active {
            transform: scale(0.98);
        }
        button.voice-btn {
            background: #10b981;
        }
        button.voice-btn:hover {
            background: #059669;
        }
        .img-container { 
            width: 100%; 
            margin-top: 20px; 
            text-align: center; 
        }
        img { 
            width: 100%; 
            max-height: 500px; 
            object-fit: contain; 
            border-radius: 10px; 
            display: none; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); 
            border: 2px solid #334155;
        }
        #response { 
            background: #0f172a; 
            padding: 15px; 
            border-radius: 8px; 
            margin-top: 15px; 
            white-space: pre-wrap; 
            border: 1px solid #334155;
            color: #cbd5e1;
        }
        .status-txt { 
            font-weight: bold; 
            margin-top: 15px; 
            color: #38bdf8; 
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>AI-Eyes313 Commander</h1>
        <p>Advanced Multimodal AI Suite (Voice & HD Integrated)</p>
    </header>

    <div class="container">
        <!-- 🤖 CHATBOT SECTION -->
        <div class="card">
            <h2>🤖 AI Chatbot</h2>
            <input id="prompt" placeholder="Ask Gemini anything or use Voice...">
            <div class="btn-group">
                <button onclick="askAI()">Ask AI</button>
                <button class="voice-btn" onclick="startVoice('prompt', 'response')">🎙️ Speak (بولو)</button>
            </div>
            <p id="response">بوٹ کا جواب یہاں نظر آئے گا...</p>
        </div>

        <!-- 🎨 IMAGE GENERATOR SECTION -->
        <div class="card">
            <h2>🎨 AI Image Generator (Ultra-HD Auto)</h2>
            <textarea id="imgPrompt" placeholder="Describe your image (e.g., 'sports bike on road'). System will auto-boost to Ultra Realistic HD..."></textarea>
            <div class="btn-group">
                <button onclick="generateImage()">Generate Image</button>
                <button class="voice-btn" onclick="startVoice('imgPrompt', 'imgStatus')">🎙️ Speak (بولو)</button>
            </div>
            
            <div class="img-container">
                <img id="resultImage" alt="AI Generated Output">
            </div>
            <p id="imgStatus" class="status-txt"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
