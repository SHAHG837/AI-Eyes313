<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI-Eyes313 Commander</title>

<style>
body{
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

header{
    background: #1e293b;
    padding: 20px;
    text-align: center;
}

.container{
    padding: 20px;
}

.card{
    background: #1e293b;
    padding: 20px;
    margin: 20px 0;
    border-radius: 12px;
}

input, textarea{
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button{
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

img{
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
    display: block;
}
</style>
</head>

<body>

<header>
<h1>AI-Eyes313 Commander</h1>
<p>All-in-One AI System</p>
</header>

<div class="container">

<!-- 🤖 CHATBOT -->
<div class="card">
<h2>🤖 AI Chatbot</h2>

<input id="prompt" placeholder="اپنا سوال لکھیں">

<button onclick="askAI()">Ask AI</button>

<p id="response"></p>
</div>

<!-- 🎨 IMAGE GENERATOR -->
<div class="card">
<h2>🎨 AI Image Generator</h2>

<textarea id="imgPrompt" placeholder="Image prompt لکھیں"></textarea>

<button onclick="generateImage()">Generate Image</button>

<img id="resultImage">
<p id="imgStatus"></p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
